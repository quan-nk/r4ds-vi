project:
  type: book
  output-dir: _book

lang: vi

book:
  title: "R cho Khoa học Dữ liệu (Phiên bản 2)"
  reader-mode: true

  page-footer:
    left: |
      R cho Khoa học Dữ liệu (2e) được viết bởi Hadley Wickham, Mine
      Çetinkaya-Rundel, và Garrett Grolemund. Bản dịch tiếng Việt bởi
      Nguyễn Khởi Quân.
    right: |
      Cuốn sách này được xây dựng bằng <a href="https://quarto.org/">Quarto</a>.
  cover-image: cover.jpg
  favicon: cover.jpg
  site-url: https://quan-nk.github.io/r4ds-vi/
  repo-url: https://github.com/quan-nk/r4ds-vi/
  repo-branch: main
  repo-actions: [edit, issue]
  chapters:
    - index.qmd

    - preface-2e.qmd
    - intro.qmd

    - part: whole-game.qmd
      chapters:
        - data-visualize.qmd
        - workflow-basics.qmd
        - data-transform.qmd
        - workflow-style.qmd
        - data-tidy.qmd
        - workflow-scripts.qmd
        - data-import.qmd
        - workflow-help.qmd

    - part: visualize.qmd
      chapters:
        - layers.qmd
        - EDA.qmd
        - communication.qmd

    - part: transform.qmd
      chapters:
        - logicals.qmd
        - numbers.qmd
        - strings.qmd
        - regexps.qmd
        - factors.qmd
        - datetimes.qmd
        - missing-values.qmd
        - joins.qmd

    - part: import.qmd
      chapters:
        - spreadsheets.qmd
        - databases.qmd
        - arrow.qmd
        - rectangling.qmd
        - webscraping.qmd

    - part: program.qmd
      chapters:
        - functions.qmd
        - iteration.qmd
        - base-R.qmd

    - part: communicate.qmd
      chapters:
        - quarto.qmd
        - quarto-formats.qmd

format:
  html:
    theme:
      - cosmo
      - r4ds.scss
    code-link: true

    author-meta: "Hadley Wickham, Mine Çetinkaya-Rundel, và Garrett Grolemund"
    callout-appearance: simple

execute:
  freeze: auto

editor: source
